<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Console Panel | vi.video</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="bg-gradient-to-tr from-violet-600 to-fuchsia-600 p-2.5 rounded-xl shadow-lg shadow-violet-500/20 flex items-center justify-center">
                <i class="fa-solid fa-terminal text-lg text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">vi.<span class="text-violet-500">video</span></span>
        </div>
        <a href="index.html" class="text-sm bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl border border-slate-700 transition duration-150">
            <i class="fa-solid fa-arrow-left mr-2"></i>Back to Live Site
        </a>
    </header>

    <main class="flex-grow container mx-auto px-4 py-12 flex items-center justify-center">
        <div class="w-full max-w-3xl bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl">
            <div class="flex items-center space-x-3 mb-6 border-b border-slate-800 pb-4">
                <i class="fa-solid fa-sliders text-2xl text-violet-500"></i>
                <h2 class="text-2xl font-bold text-white">Host Console Panel</h2>
            </div>
            
            <form id="add-video-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">YouTube Video Embed Link or iframe Code</label>
                    <input type="text" id="video-iframe" placeholder='e.g., https://www.youtube.com/embed/dQw4w9WgXcQ' 
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-violet-500 font-mono text-sm" required>
                    <p class="text-xs text-slate-500 mt-1.5">Provide either the direct embed URL or copy the entire <code>&lt;iframe&gt;</code> snippet from YouTube.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Video Title</label>
                    <input type="text" id="video-title" placeholder="e.g., Learn Advanced Node.js Architecture" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-violet-500" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Description / Code Guide</label>
                    <textarea id="video-desc" rows="6" placeholder='To create code blocks, wrap the content inside double quotes like: "const express = require(&#10;express&#10;);" ' 
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-violet-500 font-mono text-sm" required></textarea>
                </div>

                <div class="flex justify-end pt-2">
                    <button type="submit" class="bg-violet-600 hover:bg-violet-500 text-white font-medium px-6 py-3 rounded-xl transition duration-200 flex items-center space-x-2 cursor-pointer shadow-lg shadow-violet-600/20">
                        <i class="fa-solid fa-plus text-sm"></i>
                        <span>Publish Video Globally</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="border-t border-slate-900 bg-slate-950/80 py-6 text-center text-sm text-slate-500">
        &copy; 2026 vi.video. Host Console Workspace.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use the exact same connection keys as index.html
        const SUPABASE_URL = "https://your-project-id.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.your-actual-anon-key";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Handle submissions to the global database layer
        document.getElementById('add-video-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let inputField = document.getElementById('video-iframe').value.trim();
            const title = document.getElementById('video-title').value.trim();
            const description = document.getElementById('video-desc').value.trim();
            
            let embedUrl = inputField;

            if (inputField.startsWith('<iframe')) {
                const match = inputField.match(/src=["']([^"']+)["']/);
                if (match && match[1]) {
                    embedUrl = match[1];
                }
            }

            const { error } = await supabase
                .from('videos')
                .insert([{ title, embedUrl, description }]);

            if (error) {
                alert("Cloud Sync Failure: " + error.message);
                return;
            }

            this.reset();
            alert("Video successfully added to the global database!");
            window.location.href = 'index.html'; // Instantly route to home to view results
        });
    </script>
</body>
</html>
