<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BB.Blogs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

body{
margin:0;
background: radial-gradient(circle at top,#0f172a,#050814);
color:white;
}

header{
text-align:center;
padding:30px 20px;
}

header h1{
margin:0;
font-size:42px;
background: linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

header p{
color:#94a3b8;
margin-top:8px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* POST BOX */
.post-box{
background: rgba(255,255,255,0.06);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.1);
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
margin-bottom:25px;
}

textarea{
width:100%;
height:130px;
padding:15px;
border-radius:12px;
border:none;
outline:none;
resize:none;
background:#0b1220;
color:white;
font-size:14px;
border:1px solid rgba(255,255,255,0.08);
}

textarea:focus{
border:1px solid #60a5fa;
}

/* BUTTON */
button{
margin-top:12px;
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
background: linear-gradient(90deg,#60a5fa,#a78bfa);
color:white;
font-weight:600;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* BLOG CARD */
.blog{
background: rgba(255,255,255,0.06);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.08);
padding:18px;
border-radius:16px;
margin-bottom:15px;
transition:0.2s;
}

.blog:hover{
transform:translateY(-3px);
}

.username{
font-weight:600;
color:#34d399;
margin-bottom:10px;
}

/* TEXT */
.normal{
color:#e2e8f0;
line-height:1.6;
white-space:pre-wrap;
}

/* COPY BLOCK */
.block{
background:#000;
padding:12px;
border-radius:10px;
white-space:pre-wrap;
user-select:all;
border:1px solid rgba(255,255,255,0.1);
color:#f8fafc;
}

/* MOBILE */
@media(max-width:600px){
header h1{font-size:32px;}
}
</style>
</head>

<body>

<header>
<h1>BB.Blogs</h1>
<p>Write. Share. Inspire globally.</p>
</header>

<div class="container">

<!-- WRITE -->
<div class="post-box">
<h3>Create Your Blog</h3>
<textarea id="blogText" placeholder='Write your blog... use "text" for copyable block'></textarea>
<button onclick="publishBlog()">Publish</button>
</div>

<!-- BLOGS -->
<div id="blogList"></div>

</div>

<script>

let blogs = JSON.parse(localStorage.getItem("bbblogs") || "[]");

function renderBlogs(){
const list = document.getElementById("blogList");
list.innerHTML = "";

blogs.slice().reverse().forEach(b => {

let content;

if(b.text.startsWith('"') && b.text.endsWith('"')){
content = `<div class="block">${b.text.slice(1,-1)}</div>`;
} else {
content = `<div class="normal">${b.text}</div>`;
}

list.innerHTML += `
<div class="blog">
<div class="username">👤 ${b.user}</div>
${content}
</div>
`;
});
}

function publishBlog(){

let text = document.getElementById("blogText").value;

if(!text.trim()){
alert("Write something first!");
return;
}

let user = prompt("Enter your name:");

if(!user || !user.trim()){
alert("Name required!");
return;
}

blogs.push({
user:user,
text:text
});

localStorage.setItem("bbblogs", JSON.stringify(blogs));

document.getElementById("blogText").value = "";

renderBlogs();
}

renderBlogs();

</script>

</body>
</html>
