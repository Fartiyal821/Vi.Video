<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BB.Blogs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#0b1020;
color:white;
}

header{
text-align:center;
padding:25px;
background:#111827;
}

header h1{
margin:0;
font-size:38px;
background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* INPUT */
.box{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
outline:none;
background:#0b1220;
color:white;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#60a5fa;
font-weight:600;
}

.blog{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.user{
color:#34d399;
font-weight:600;
}

.meta{
font-size:12px;
color:#9ca3af;
margin-top:5px;
}

.block{
background:black;
padding:10px;
border-radius:8px;
margin-top:8px;
white-space:pre-wrap;
user-select:all;
}

.actions{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.smallbtn{
padding:6px 10px;
font-size:12px;
background:#1f2937;
color:white;
border-radius:6px;
cursor:pointer;
}

.comment{
margin-top:8px;
padding:8px;
background:#0b1220;
border-radius:6px;
font-size:13px;
}

</style>
</head>

<body>

<header>
<h1>BB.Blogs</h1>
<p>Global Coding & Ideas Platform</p>
</header>

<div class="container">

<!-- CREATE POST -->
<div class="box">
<h3>Create Blog</h3>

<input id="username" placeholder="Your name">

<input id="tags" placeholder="Tags (e.g. coding, ai, life)">

<textarea id="text" placeholder='Write blog... use "text" for block'></textarea>

<button onclick="postBlog()">Publish</button>
</div>

<!-- SEARCH -->
<div class="box">
<input id="search" placeholder="Search blogs..." onkeyup="render()">
</div>

<!-- BLOG LIST -->
<div id="blogs"></div>

</div>

<script>
// 🔥 FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let posts = [];

// POST BLOG
async function postBlog(){
let user = document.getElementById("username").value;
let text = document.getElementById("text").value;
let tags = document.getElementById("tags").value;

if(!user || !text) return alert("Fill all fields");

await db.collection("blogs").add({
user,
text,
tags,
likes:0,
comments:[],
time:Date.now()
});

document.getElementById("text").value="";
loadBlogs();
}

// LOAD BLOGS
async function loadBlogs(){
const snap = await db.collection("blogs").orderBy("time","desc").get();

posts = [];
snap.forEach(doc=>{
posts.push({id:doc.id,...doc.data()});
});

render();
}

// LIKE
async function like(id){
let ref = db.collection("blogs").doc(id);
let doc = await ref.get();
ref.update({likes: (doc.data().likes||0)+1});
loadBlogs();
}

// COMMENT
async function comment(id){
let c = prompt("Write comment:");
if(!c) return;

let ref = db.collection("blogs").doc(id);
let doc = await ref.get();

let arr = doc.data().comments || [];
arr.push(c);

ref.update({comments:arr});
loadBlogs();
}

// RENDER
function render(){
let q = document.getElementById("search").value.toLowerCase();
let div = document.getElementById("blogs");
div.innerHTML="";

let filtered = posts.filter(p =>
p.text.toLowerCase().includes(q) ||
p.user.toLowerCase().includes(q) ||
(p.tags||"").toLowerCase().includes(q)
);

// trending sort (likes priority if search empty)
if(!q){
filtered.sort((a,b)=>b.likes-a.likes);
}

filtered.forEach(p=>{

let content = (p.text.startsWith('"') && p.text.endsWith('"'))
? `<div class="block">${p.text.slice(1,-1)}</div>`
: `<div>${p.text}</div>`;

div.innerHTML += `
<div class="blog">
<div class="user">👤 ${p.user}</div>
<div class="meta">🏷️ ${p.tags || "no tags"} | ❤️ ${p.likes||0}</div>

${content}

<div class="actions">
<button class="smallbtn" onclick="like('${p.id}')">❤️ Like</button>
<button class="smallbtn" onclick="comment('${p.id}')">💬 Comment</button>
</div>

<div>
${(p.comments||[]).map(c=>`<div class="comment">💬 ${c}</div>`).join("")}
</div>
</div>
`;
});
}

// AUTO REFRESH
setInterval(loadBlogs,5000);

loadBlogs();

</script>

</body>
</html>
