<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f1a;
color:white;
}

header{
padding:20px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#4ade80;
margin:0;
}

.container{
padding:20px;
}

.video-card{
background:#1f2937;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

iframe{
width:100%;
height:400px;
border-radius:10px;
}

.desc{
margin-top:10px;
background:#111827;
padding:10px;
border-radius:8px;
}

.copybox{
background:#000;
padding:10px;
border-radius:5px;
white-space:pre-wrap;
user-select:all;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#4ade80;
color:black;
font-weight:bold;
}

.host-panel{
display:none;
padding:20px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;

}

<body>

<header>
<h1>vi.video</h1>
<span>Professional Coding Video Hub</span>
</header>

<!-- PUBLIC VIEW -->
<div class="container" id="publicView"></div>

<!-- HOST PANEL -->
<div class="host-panel" id="hostPanel">
<h2>Host Panel (Hidden Mode)</h2>

<small>Paste full YouTube iframe code below</small>
<textarea id="iframeCode" placeholder="<iframe ...></iframe>"></textarea>

<small>Description (use "" for copyable block)</small>
<textarea id="desc"></textarea>

<button onclick="addVideo()">Add Video</button>
</div>

<script>
// detect host mode
const isHost = window.location.pathname.includes("/host");

const publicView = document.getElementById("publicView");
const hostPanel = document.getElementById("hostPanel");

let videos = JSON.parse(localStorage.getItem("vivideos") || "[]");

function render(){
publicView.innerHTML = "";

videos.forEach(v => {

let descHTML;

if(v.desc.startsWith('"') && v.desc.endsWith('"')){
descHTML = `<div class="copybox">${v.desc.slice(1,-1)}</div>`;
} else {
descHTML = `<div class="desc">${v.desc}</div>`;
}

publicView.innerHTML += `
<div class="video-card">
${v.iframe}
${descHTML}
</div>
`;
});
}

function addVideo(){
const iframe = document.getElementById("iframeCode").value;
const desc = document.getElementById("desc").value;

videos.push({iframe, desc});
localStorage.setItem("vivideos", JSON.stringify(videos));

document.getElementById("iframeCode").value = "";
document.getElementById("desc").value = "";

render();
alert("Video Added!");
}

// mode switch
if(isHost){
hostPanel.style.display = "block";
} else {
render();
}
</script>

</body>
